name: CI

# Continuous integration for the Pacta monorepo: the Soroban escrow contract
# (Rust) and the Vite/React frontend. Runs on every push and PR to main.
# Continuous deployment is handled by Vercel, which auto-deploys main to
# https://pacta-zarrah.vercel.app on a successful push.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  contract:
    name: Contract (test + wasm build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable + wasm target)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32v1-none

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Run contract tests
        run: cargo test --workspace

      - name: Build contract to wasm
        run: cargo build --release --target wasm32v1-none -p pacta-escrow

  frontend:
    name: Frontend (type-check + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          # Node 24 ships npm 11, matching the npm that generated package-lock.json.
          # (npm 10 on Node 20 rejects the lock as out of sync over the optional
          # utf-8-validate dep.)
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        # Use `npm install` rather than the stricter `npm ci`: the committed
        # package-lock.json omits ws's OPTIONAL native deps (bufferutil,
        # utf-8-validate), which makes `npm ci` fail with EUSAGE on some npm
        # versions. `npm install` reconciles those optional deps gracefully.
        run: npm install --no-audit --no-fund

      - name: Type-check and build
        run: npm run build
