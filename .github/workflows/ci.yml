name: CI

# Continuous integration for the PACTA monorepo: the Soroban escrow contract
# (Rust) and the Vite/React frontend. Runs on every push and PR to main.
# Continuous deployment is handled by Vercel, which auto-deploys main to
# https://pacta-zarrah.vercel.app on a successful push.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  contract:
    name: Contract (test + wasm build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable + wasm target)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32v1-none

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Run contract tests
        run: cargo test --workspace

      - name: Build contract to wasm
        run: cargo build --release --target wasm32v1-none -p pacta-escrow

  frontend:
    name: Frontend (type-check + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          # Node 24 ships npm 11, matching the npm that generated package-lock.json.
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build the generated contract bindings (packages/pacta)
        # The frontend imports the `pacta` TS bindings, whose dist/ is gitignored
        # and therefore absent on a fresh checkout. Build them first so the
        # frontend's `tsc -b` can resolve `pacta` (mirrors vercel.json).
        run: |
          npm install --no-audit --no-fund --prefix packages/pacta
          npm run build --prefix packages/pacta

      - name: Install frontend dependencies
        # `npm install` (not the stricter `npm ci`): the lockfile omits ws's
        # OPTIONAL native deps (bufferutil/utf-8-validate), which makes `npm ci`
        # fail with EUSAGE. `npm install` reconciles them gracefully.
        run: npm install --no-audit --no-fund --prefix frontend

      - name: Type-check and build frontend
        run: npm run build --prefix frontend
