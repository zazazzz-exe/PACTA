<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>PACTA — Animated Demo</title>
<style>
  :root{
    --canvas:#F4F2EC; --paper:#FFF; --mist:#F8F6F1;
    --ink:#1A201D; --slate:#586059; --fog:#8C918A; --hair:#E6E2D8; --hair2:#D8D3C6;
    --accent:#0B7A63; --accent-deep:#0A5A49; --tint:#E2F2EC;
    --amber:#C77D11; --amber-deep:#8A560A; --amber-tint:#FAEED6;
    --carbon:#0B0F0E; --signal:#34E3B0;
    --sans:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
    --mono:ui-monospace,"SFMono-Regular",Menlo,Consolas,monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:var(--sans);color:var(--ink);min-height:100%;
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:22px;padding:28px 16px;
    background:radial-gradient(90% 70% at 50% 0%,rgba(52,227,176,.14),transparent 60%),linear-gradient(160deg,#0A3328,#0B7A63 55%,#0A5A49);
    -webkit-font-smoothing:antialiased;
  }
  .mono{font-family:var(--mono);font-variant-numeric:tabular-nums}

  .caption{color:#EAF3EF;font-size:clamp(15px,2vw,20px);font-weight:600;text-align:center;max-width:420px;min-height:52px;display:flex;align-items:center;justify-content:center;line-height:1.35;text-wrap:balance;transition:opacity .3s}
  .caption b{color:var(--signal)}

  .phone{width:360px;height:740px;border-radius:42px;background:#0c1210;padding:11px;box-shadow:0 40px 80px rgba(8,40,32,.5);flex-shrink:0}
  .screen{width:100%;height:100%;border-radius:32px;overflow:hidden;background:var(--canvas);display:flex;flex-direction:column;position:relative}
  .appbar{display:flex;align-items:center;gap:8px;padding:14px 16px 10px}
  .brand{display:flex;align-items:center;gap:8px;font-weight:800}
  .brand .dot{width:24px;height:24px;border-radius:8px;background:linear-gradient(135deg,var(--accent),var(--accent-deep));display:grid;place-items:center;color:#fff;font-size:13px;font-weight:900}
  .net{margin-left:2px;font-family:var(--mono);font-size:11px;color:var(--slate);display:inline-flex;align-items:center;gap:5px}
  .net i{width:6px;height:6px;border-radius:999px;background:var(--accent)}
  .netbtn{margin-left:auto;border:1px solid var(--hair2);background:var(--paper);color:var(--slate);font-weight:700;font-size:11px;border-radius:999px;padding:6px 11px;display:inline-flex;align-items:center;gap:5px;transition:.3s}
  .netbtn.off{background:var(--amber-tint);border-color:transparent;color:var(--amber-deep)}
  .netbtn i{width:6px;height:6px;border-radius:999px;background:currentColor}

  #banner{overflow:hidden}
  .banner{font-size:12.5px;font-weight:700;padding:9px 16px;display:flex;align-items:center;gap:8px}
  .banner.warn{background:var(--amber-tint);color:var(--amber-deep)}
  .banner.good{background:var(--tint);color:var(--accent-deep)}
  .banner .sp{width:13px;height:13px;border-radius:999px;border:2px solid currentColor;border-top-color:transparent;animation:rot .8s linear infinite}

  .content{flex:1;overflow:hidden;padding:6px 16px 16px;position:relative}
  .view{position:absolute;inset:0;padding:6px 16px 16px;overflow:hidden;opacity:0;transition:opacity .35s ease, transform .35s ease;transform:translateY(10px)}
  .view.show{opacity:1;transform:none}
  h2.pg{font-size:21px;letter-spacing:-.02em;margin:8px 2px 14px}
  .muted{color:var(--slate)} .fog{color:var(--fog)}

  .balance{border-radius:18px;background:linear-gradient(150deg,var(--accent),var(--accent-deep));color:#fff;padding:18px;box-shadow:0 6px 16px rgba(10,90,73,.25)}
  .balance .l{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:rgba(255,255,255,.72)}
  .balance .b{font-family:var(--mono);font-size:30px;font-weight:700;margin-top:4px}
  .balance .s{font-size:11px;color:rgba(255,255,255,.72);margin-top:4px}
  .qa{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:12px}
  .qa .k{background:var(--paper);border:1px solid var(--hair);border-radius:16px;padding:12px 4px;display:flex;flex-direction:column;align-items:center;gap:7px;font-size:12px;font-weight:600}
  .qa .ic{width:38px;height:38px;border-radius:999px;background:var(--accent);color:#fff;display:grid;place-items:center;font-size:17px}
  .qa .k:nth-child(2) .ic{background:var(--accent-deep)} .qa .k:nth-child(3) .ic{background:var(--amber)}
  .sect{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.09em;color:var(--slate);margin:18px 2px 8px}
  .card{background:var(--paper);border:1px solid var(--hair);border-radius:16px;padding:13px}
  .row{display:flex;align-items:center;gap:12px} .grow{flex:1;min-width:0}
  .chip{width:32px;height:32px;border-radius:999px;display:grid;place-items:center;font-family:var(--mono);font-size:11px;font-weight:700;flex-shrink:0}
  .chip.xlm{background:var(--accent);color:#fff} .chip.usdc{background:var(--accent-deep);color:#fff}
  .code{font-size:14px;font-weight:600} .amt{font-family:var(--mono);font-size:11px;color:var(--fog)} .php{font-family:var(--mono);font-size:14px;font-weight:600}

  .lbl2{display:block;font-size:12px;color:var(--slate);margin:14px 2px 6px}
  .fld{width:100%;height:46px;border:1px solid var(--hair);border-radius:12px;background:var(--paper);padding:0 14px;font-family:var(--mono);font-size:15px;color:var(--ink);display:flex;align-items:center}
  .fld.focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(11,122,99,.15)}
  .caret{display:inline-block;width:2px;height:18px;background:var(--accent);margin-left:1px;animation:blink 1s steps(1) infinite;vertical-align:middle}
  .btn{width:100%;height:48px;border-radius:14px;background:var(--accent);color:#fff;font-weight:700;font-size:15px;display:flex;align-items:center;justify-content:center;gap:8px;margin-top:18px}
  .btn.amber{background:var(--amber)}

  .receipt{text-align:center;padding:34px 8px}
  .ric{width:64px;height:64px;border-radius:999px;display:grid;place-items:center;margin:0 auto 14px;font-size:30px}
  .ric.good{background:var(--accent);color:#fff} .ric.q{background:var(--amber-tint);color:var(--amber-deep)}
  .receipt h3{font-size:22px} .receipt p{color:var(--slate);font-size:14px;margin-top:8px;line-height:1.5}
  .sep{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:var(--slate);margin:14px 2px 8px}
  .qrow{border:1px dashed var(--amber);background:var(--amber-tint)}

  .tap{position:absolute;width:34px;height:34px;border-radius:999px;background:rgba(11,122,99,.28);border:2px solid var(--accent);pointer-events:none;transform:translate(-50%,-50%) scale(.3);opacity:0;z-index:20}
  .tap.go{animation:tap .5s ease-out}

  .ctrl{display:flex;gap:10px;align-items:center}
  .ctrl button{border:1px solid rgba(255,255,255,.18);background:rgba(255,255,255,.08);color:#EAF3EF;border-radius:999px;padding:9px 16px;font-family:var(--sans);font-weight:600;font-size:13px;cursor:pointer;display:inline-flex;align-items:center;gap:7px}
  .ctrl button:hover{background:rgba(52,227,176,.16);border-color:var(--signal)}
  .ctrl .dots{display:flex;gap:6px;margin:0 4px}
  .ctrl .dots i{width:7px;height:7px;border-radius:999px;background:rgba(255,255,255,.25)}
  .ctrl .dots i.on{background:var(--signal)}

  @keyframes rot{to{transform:rotate(360deg)}}
  @keyframes blink{50%{opacity:0}}
  @keyframes tap{0%{opacity:.9;transform:translate(-50%,-50%) scale(.3)}100%{opacity:0;transform:translate(-50%,-50%) scale(1.7)}}
  @media (prefers-reduced-motion:reduce){.view{transition:none}.caret,.tap{animation:none}}
</style>
</head>
<body>
  <div class="caption" id="cap">PACTA</div>

  <div class="phone">
    <div class="screen">
      <div class="appbar">
        <div class="brand"><span class="dot">P</span>PACTA</div>
        <span class="net"><i></i>testnet</span>
        <span class="netbtn" id="net"><i></i>Online</span>
      </div>
      <div id="banner"></div>
      <div class="content" id="content"></div>
      <div class="tap" id="tap"></div>
    </div>
  </div>

  <div class="ctrl">
    <button id="pp">❚❚ Pause</button>
    <div class="dots" id="dots"></div>
    <button id="replay">↻ Replay</button>
  </div>

<script>
"use strict";
const cap=document.getElementById("cap"), content=document.getElementById("content"),
      banner=document.getElementById("banner"), net=document.getElementById("net"),
      tapEl=document.getElementById("tap"), dots=document.getElementById("dots");

let playing=true, cancelToken=0, xlm=1935.2;
const peso = () => "₱"+Math.round(xlm*22+120*56).toLocaleString();
const f = n => Number(n).toLocaleString(undefined,{maximumFractionDigits:4});

/* screens ------------------------------------------------------- */
const V = {
  home: () => `
    <h2 class="pg">Your wallet</h2>
    <div class="balance"><div class="l">Total balance</div><div class="b">${peso()}</div><div class="s">≈ ${f(xlm)} XLM</div></div>
    <div class="qa">
      <div class="k" id="send-btn"><span class="ic">↑</span>Send</div>
      <div class="k"><span class="ic">↓</span>Receive</div>
      <div class="k"><span class="ic">⇄</span>Convert</div></div>
    <div class="sect">Assets</div>
    <div class="card row"><span class="chip xlm">XL</span><span class="grow"><span class="code">XLM</span><br><span class="amt">${f(xlm)}</span></span><span class="php">${"₱"+Math.round(xlm*22).toLocaleString()}</span></div>
    <div class="card row" style="margin-top:8px"><span class="chip usdc">US</span><span class="grow"><span class="code">USDC</span><br><span class="amt">120</span></span><span class="php">₱6,720</span></div>`,
  send: (to,amt,focus) => `
    <h2 class="pg" id="send-title">${offline?"Queue payment":"Send"}</h2>
    <span class="lbl2">Recipient address</span>
    <div class="fld ${focus==='to'?'focus':''}">${to}${focus==='to'?'<span class="caret"></span>':''}</div>
    <span class="lbl2">Amount (XLM)</span>
    <div class="fld ${focus==='amt'?'focus':''}">${amt}${focus==='amt'?'<span class="caret"></span>':''}</div>
    <div class="btn ${offline?'amber':''}" id="queue-btn">${offline?'⤓ Queue payment':'↑ Send now'}</div>
    <p class="muted" style="font-size:12px;text-align:center;margin-top:10px">${offline?'Queued while offline, delivered when you reconnect.':'Pays directly on Stellar in seconds.'}</p>`,
  queued: (to,amt) => `
    <div class="receipt"><div class="ric q">☁</div><h3>Queued</h3>
      <p>${amt} XLM to <span class="mono">${to}</span> will send automatically when you're back online.</p></div>`,
  activity: () => `
    <h2 class="pg">Activity</h2>
    <div class="sep">Today</div>
    <div class="card row" style="border-color:var(--accent)"><span class="chip xlm">XL</span>
      <span class="grow"><span class="code">Sent XLM</span><br><span class="amt">to GDCOP…76GI</span></span>
      <span style="text-align:right"><span class="mono" style="font-size:14px">−25</span><br><span class="amt">just now</span></span></div>
    <div class="card row" style="margin-top:8px"><span class="chip xlm">XL</span>
      <span class="grow"><span class="code">Received XLM</span><br><span class="amt">from GDCOP…76GI</span></span>
      <span style="text-align:right"><span class="mono" style="font-size:14px;color:var(--accent-deep)">+250</span><br><span class="amt">6m</span></span></div>`,
  activityQueued: (to,amt) => `
    <h2 class="pg">Activity</h2>
    <div class="sep">Queued</div>
    <div class="card row qrow"><span class="chip xlm">XL</span>
      <span class="grow"><span class="code">Queued XLM</span><br><span class="amt">to ${to}</span></span>
      <span style="text-align:right"><span class="mono" style="font-size:14px">−${amt}</span><br><span class="amt">waiting</span></span></div>`
};

let offline=false;
function setNet(off){ offline=off; net.className="netbtn"+(off?" off":""); net.innerHTML=`<i></i>${off?"Offline":"Online"}`; }
function setBanner(html){ banner.innerHTML=html; }
function show(html){
  const v=document.createElement("div"); v.className="view"; v.innerHTML=html;
  content.innerHTML=""; content.appendChild(v); void v.offsetWidth; v.classList.add("show");
}
function setCap(html){ cap.style.opacity=0; setTimeout(()=>{cap.innerHTML=html; cap.style.opacity=1;},160); }

const sleep = ms => new Promise(res=>{ const my=cancelToken; const t=setInterval(()=>{ if(my!==cancelToken){clearInterval(t);res();return;} },80); setTimeout(()=>{ if(my===cancelToken){clearInterval(t);res();} },ms); });
async function hold(ms){ await sleep(ms); while(!playing && cancelToken===cancelToken) await new Promise(r=>setTimeout(r,100)); }
async function tapAt(id){
  const e=document.getElementById(id); if(!e) return;
  const s=e.getBoundingClientRect(), p=tapEl.parentElement.getBoundingClientRect();
  tapEl.style.left=(s.left-p.left+s.width/2)+"px";
  tapEl.style.top=(s.top-p.top+s.height/2)+"px";
  tapEl.classList.remove("go"); void tapEl.offsetWidth; tapEl.classList.add("go");
  await sleep(480);
}
async function typeInto(get,set,text,rerender){
  let cur="";
  for(const ch of text){ cur+=ch; set(cur); rerender(); await sleep(75); }
}

/* timeline ------------------------------------------------------ */
const TO="GDCOP…76GI"; const AMT="25";
const steps=[
  async()=>{ setNet(false); setBanner(""); setCap("Hold your money in one wallet."); show(V.home()); await hold(2600); },
  async()=>{ setCap("Tap <b>Send</b>."); await tapAt("send-btn"); await hold(400); },
  async()=>{ show(V.send("","",null)); await hold(500); },
  async()=>{ setCap("But you're in a <b>dead zone</b> — no signal."); setNet(true); setBanner('<div class="banner warn">☁ You\'re offline. Payments will queue.</div>'); show(V.send("","",'to')); await hold(1700); },
  async()=>{ let to=""; await typeInto(()=>to,v=>to=v,TO,()=>show(V.send(to,"",'to'))); await hold(300);
             let amt=""; show(V.send(TO,"",'amt')); await typeInto(()=>amt,v=>amt=v,AMT,()=>show(V.send(TO,amt,'amt'))); await hold(500); },
  async()=>{ setCap("Send it anyway — PACTA <b>queues</b> it."); await tapAt("queue-btn"); await hold(350); show(V.queued(TO,AMT)); await hold(2200); },
  async()=>{ setCap("<b>1 payment</b> waiting to send."); setBanner('<div class="banner warn">☁ You\'re offline. 1 payment queued and will send on reconnect.</div>'); show(V.activityQueued(TO,AMT)); await hold(2200); },
  async()=>{ setCap("The signal's back."); setNet(false); setBanner('<div class="banner good"><span class="sp"></span> Delivering queued payments…</div>'); await hold(1700); },
  async()=>{ setCap("Delivered — <b>automatically</b>."); xlm=1935.2-25; setBanner('<div class="banner good">✓ Delivered 1 queued payment.</div>'); show(V.activity()); await hold(2600); },
  async()=>{ setCap("Your money moves — even when the signal doesn't."); setBanner(""); show(V.home()); await hold(2800); }
];

let idx=0;
function paintDots(){ dots.innerHTML=steps.map((_,k)=>`<i class="${k===idx?'on':''}"></i>`).join(""); }
async function run(){
  const my=cancelToken;
  while(my===cancelToken){
    paintDots();
    await steps[idx]();
    if(my!==cancelToken) return;
    idx=(idx+1)%steps.length;
    if(idx===0){ xlm=1935.2; await sleep(500); }
  }
}
function restart(){ cancelToken++; idx=0; xlm=1935.2; playing=true; document.getElementById("pp").textContent="❚❚ Pause"; run(); }

document.getElementById("pp").onclick=e=>{ playing=!playing; e.target.textContent=playing?"❚❚ Pause":"▶ Play"; };
document.getElementById("replay").onclick=restart;
restart();
</script>
</body>
</html>
